                billList.innerHTML = '<div class="empty"><i>📋</i><div>暂无账单数据</div></div>';
                return;
            }

            billList.innerHTML = '';
            bills.forEach(bill => {
                const cat = categories.find(c => c.id === bill.categoryId) || { name: '未知类别' };
                const wrapper = document.createElement('div');
                wrapper.className = 'list-item-wrapper';
                
                const descText = bill.note ? `${bill.date} | ${bill.note}` : bill.date;
                
                wrapper.innerHTML = `
                    <div class="list-item">
                        <div class="info">
                            <div class="name">${cat.name} ${bill.type === 'income' ? '(收入)' : '(支出)'}</div>
                            <div class="desc">${descText}</div>
                        </div>
                        <div class="actions">
                            <span style="font-weight: 700; ${bill.type === 'income' ? 'color: #34C759' : 'color: #FF3B30'}">
                                ${bill.type === 'income' ? '+' : '-'}¥${bill.amount.toFixed(2)}
                            </span>
                            <button class="btn-small edit-bill" data-id="${bill.id}">编辑</button>
                        </div>
                    </div>
                    <div class="delete-action" data-id="${bill.id}">
                        删除
                    </div>
                `;
                billList.appendChild(wrapper);
            });
            
            // 绑定删除按钮事件
            document.querySelectorAll('.delete-action').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    if (!confirm('确定删除该账单？')) return;

                    const bills = getBills();
                    const billIndex = bills.findIndex(b => b.id === id);
                    
                    if (billIndex === -1) {
                        showToast('账单不存在');
                        return;
                    }
                    
                    const billToDelete = bills[billIndex];
                    const updatedBills = bills.filter(b => b.id !== id);
                    localStorage.setItem(STORAGE.BILLS, JSON.stringify(updatedBills));
                    
                    // 更新月度统计
                    updateMonthlyStatsForBill(billToDelete, 'subtract');

                    renderBills(document.getElementById('dateFilter').value);
                    renderStats();
                    showToast('账单删除成功');
                });
            });
        }

        // 渲染统计数据
        function renderStats() {
            const stats = getMonthlyStats();
            
            // 更新统计卡片
            document.getElementById('totalIncome').textContent = stats.income.toFixed(2);
            document.getElementById('totalExpense').textContent = stats.expense.toFixed(2);
            document.getElementById('totalBalance').textContent = stats.balance.toFixed(2);
            
            // 更新颜色
            document.getElementById('totalBalance').className = `value ${stats.balance >= 0 ? 'positive' : 'negative'}`;
        }

        // 绑定所有事件
        function bindAllEvents() {
            // ========== 导入导出功能 ==========
            document.getElementById('exportBtn').addEventListener('click', exportData);
            document.getElementById('importBtn').addEventListener('click', importData);
            document.getElementById('importFileInput').addEventListener('change', handleImportFile);

            // ========== 基础按钮 ==========
            document.getElementById('categoryBtn').addEventListener('click', function() {
                const card = document.getElementById('categoryCard');
                card.style.display = card.style.display === 'none' ? 'block' : 'none';
            });
            
            // ========== 新增：财务报表按钮 ==========
            document.getElementById('reportBtn').addEventListener('click', function() {
                loadReportData();
                document.getElementById('reportModal').classList.add('show');
            });
            
            document.getElementById('closeReportBtn').addEventListener('click', function() {
                document.getElementById('reportModal').classList.remove('show');
            });

            document.getElementById('addBillBtn').addEventListener('click', function() {
                const categories = getCategories();
                if (categories.length === 0) {
                    showToast('请先添加类别');
                    return;
                }
                resetAddBillForm();
                document.getElementById('addBillModal').classList.add('show');
            });

            document.getElementById('cancelAddBill').addEventListener('click', function() {
                document.getElementById('addBillModal').classList.remove('show');
                resetAddBillForm();
            });

            document.getElementById('saveBillBtn').addEventListener('click', function() {
                const type = document.getElementById('billType').value;
                const categoryId = document.getElementById('billCategory').value;
                const amount = parseFloat(document.getElementById('billAmount').value);
                const date = document.getElementById('billDate').value;
                const note = document.getElementById('billNote').value.trim();
                
                const today = getTodayDate();
                
                if (!categoryId) return showToast('请选择类别');
                if (isNaN(amount) || amount < 0.01) return showToast('金额必须大于0.01元');
                if (!date) return showToast('请选择日期');
                if (date > today) return showToast('不能选择未来日期');

                const bills = getBills();
                const newBill = {
                    id: generateId(),
                    type,
                    categoryId,
                    amount,
                    date,
                    note: note || ''
                };
                bills.push(newBill);
                localStorage.setItem(STORAGE.BILLS, JSON.stringify(bills));
                
                // 更新月度统计数据
                updateMonthlyStatsForBill(newBill, 'add');

                renderBills(document.getElementById('dateFilter').value);
                renderStats();
                document.getElementById('addBillModal').classList.remove('show');
                resetAddBillForm();
                showToast('账单添加成功');
            });

            // ========== 折叠/展开账单列表 ==========
            document.getElementById('toggleBillListBtn').addEventListener('click', function() {
                const billList = document.getElementById('billList');
                billList.classList.toggle('hidden');
                this.textContent = billList.classList.contains('hidden') ? '展开' : '折叠';
            });

            // ========== 类别管理 ==========
            document.getElementById('addCategoryBtn').addEventListener('click', function() {
                document.getElementById('addCategoryModal').classList.add('show');
            });

            document.getElementById('cancelAddCategory').addEventListener('click', function() {
                document.getElementById('addCategoryModal').classList.remove('show');
            });

            document.getElementById('saveCategoryBtn').addEventListener('click', function() {
                const name = document.getElementById('newCategoryName').value.trim();
                if (!name || name.length > 10) return showToast('请输入1-10个字的类别名称');

                const categories = getCategories();
                if (categories.some(c => c.name === name)) return showToast('类别名称已存在');

                categories.push({ id: generateId(), name });
                localStorage.setItem(STORAGE.CATEGORIES, JSON.stringify(categories));

                const budgets = getCategoryBudgets();
                budgets[categories[categories.length - 1].id] = { amount: 0, used: 0 };
                localStorage.setItem(STORAGE.CATEGORY_BUDGETS, JSON.stringify(budgets));
                
                // 同时初始化当月预算已用数据
                const monthlyBudgetUsed = getMonthlyBudgetUsed();
                monthlyBudgetUsed[categories[categories.length - 1].id] = { amount: 0, used: 0 };
                saveMonthlyBudgetUsed(monthlyBudgetUsed);

                renderCategories();
                document.getElementById('addCategoryModal').classList.remove('show');
                document.getElementById('newCategoryName').value = '';
                showToast('类别添加成功');
            });

            // 编辑分类（事件委托）
            document.getElementById('categoryList').addEventListener('click', function(e) {
                if (e.target.classList.contains('edit-category')) {
                    const id = e.target.dataset.id;
                    const categories = getCategories();
                    const cat = categories.find(c => c.id === id);
                    if (!cat) return;

                    const newName = prompt('请输入新的分类名称', cat.name);
                    if (!newName || newName.trim() === '' || newName.length > 10) return;
                    if (categories.some(c => c.id !== id && c.name === newName.trim())) {
                        return showToast('类别名称已存在');
                    }

                    const updated = categories.map(c => c.id === id ? { ...c, name: newName.trim() } : c);
                    localStorage.setItem(STORAGE.CATEGORIES, JSON.stringify(updated));
                    renderCategories();
                    renderCategoryBudgets();
                    showToast('分类编辑成功');
                }

                if (e.target.classList.contains('delete-category')) {
                    const id = e.target.dataset.id;
                    if (!confirm('确定删除该类别？关联账单将显示为未知类别')) return;

                    const categories = getCategories().filter(c => c.id !== id);
                    localStorage.setItem(STORAGE.CATEGORIES, JSON.stringify(categories));

                    const budgets = getCategoryBudgets();
                    delete budgets[id];
                    localStorage.setItem(STORAGE.CATEGORY_BUDGETS, JSON.stringify(budgets));
                    
                    // 同时删除当月预算已用数据
                    const monthlyBudgetUsed = getMonthlyBudgetUsed();
                    delete monthlyBudgetUsed[id];
                    saveMonthlyBudgetUsed(monthlyBudgetUsed);

                    renderCategories();
                    renderCategoryBudgets();
                    showToast('分类删除成功');
                }
            });

            // ========== 预算管理 ==========
            document.getElementById('editBudgetBtn').addEventListener('click', function() {
                const categories = getCategories();
                if (categories.length === 0) {
                    showToast('请先添加类别');
                    return;
                }
                document.getElementById('setBudgetModal').classList.add('show');
            });

            document.getElementById('cancelSetBudget').addEventListener('click', function() {
                document.getElementById('setBudgetModal').classList.remove('show');
            });

            document.getElementById('saveBudgetBtn').addEventListener('click', function() {
                const categoryId = document.getElementById('budgetCategorySelect').value;
                const amount = parseFloat(document.getElementById('budgetAmountInput').value);

                if (!categoryId) return showToast('请选择类别');
                if (isNaN(amount) || amount < 0.01) return showToast('预算金额必须大于0.01元');

                const budgets = getCategoryBudgets();
                if (!budgets[categoryId]) budgets[categoryId] = { amount: 0, used: 0 };
                budgets[categoryId].amount = amount;
                localStorage.setItem(STORAGE.CATEGORY_BUDGETS, JSON.stringify(budgets));
                
                // 同时更新当月预算已用数据中的预算额度
                const monthlyBudgetUsed = getMonthlyBudgetUsed();
                if (!monthlyBudgetUsed[categoryId]) {
                    monthlyBudgetUsed[categoryId] = { amount: 0, used: 0 };
                }
                monthlyBudgetUsed[categoryId].amount = amount;
                saveMonthlyBudgetUsed(monthlyBudgetUsed);

                renderCategoryBudgets();
                document.getElementById('setBudgetModal').classList.remove('show');
                document.getElementById('budgetAmountInput').value = '';
                showToast('预算设置成功');
            });

            // ========== 账单管理 ==========
            document.getElementById('dateFilter').addEventListener('change', function() {
                renderBills(this.value);
            });

            // 点击模态框外部关闭
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('show');
                        if (this.id === 'addBillModal') resetAddBillForm();
                        if (this.id === 'editBillModal') resetEditBillForm();
                        if (this.id === 'reportModal') {
                            // 报表模态框关闭时不需要特殊处理
                        }
                    }
                });
            });

            // 绑定编辑账单相关事件
            bindBillEditEvents();
            bindEditBillEvents();
            
            // ========== 新增：报表筛选事件 ==========
            document.getElementById('reportYearSelect').addEventListener('change', function() {
                updateReportMonthOptions();
                loadReportData();
            });
            
            document.getElementById('reportMonthSelect').addEventListener('change', function() {
                loadReportData();
            });
        }
        
        // ==================== 第二部分：新增历史月度/年度财务报表功能 ====================
        
        // 初始化报表数据
        function initReportData() {
            // 初始化年份选择器
            const yearSelect = document.getElementById('reportYearSelect');
            const currentYear = new Date().getFullYear();
            
            // 生成最近5年的选项
            for (let year = currentYear; year >= currentYear - 4; year--) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = `${year}年`;
                if (year === currentYear) {
                    option.selected = true;
                }
                yearSelect.appendChild(option);
            }
            
            // 初始化月份选择器
            updateReportMonthOptions();
        }
        
        // 更新报表月份选项
        function updateReportMonthOptions() {
            const yearSelect = document.getElementById('reportYearSelect');
            const monthSelect = document.getElementById('reportMonthSelect');
            const selectedYear = parseInt(yearSelect.value);
            const currentYear = new Date().getFullYear();
            const currentMonth = new Date().getMonth() + 1;
            
            // 清空现有月份选项（保留"年度汇总"）
            const yearOption = monthSelect.options[0];
            monthSelect.innerHTML = '';
            monthSelect.appendChild(yearOption);
            
            // 生成月份选项
            const maxMonth = (selectedYear === currentYear) ? currentMonth : 12;
            for (let month = 1; month <= maxMonth; month++) {
                const option = document.createElement('option');
                option.value = month;
                option.textContent = `${month}月`;
                monthSelect.appendChild(option);
            }
            
            // 默认选择当前月份（如果是当前年）或12月
            if (selectedYear === currentYear) {
                monthSelect.value = currentMonth;
            } else {
                monthSelect.value = 12;
            }
        }
        
        // 加载报表数据
        function loadReportData() {
            const yearSelect = document.getElementById('reportYearSelect');
            const monthSelect = document.getElementById('reportMonthSelect');
            const selectedYear = parseInt(yearSelect.value);
            const selectedMonth = monthSelect.value;
            
            if (selectedMonth === 'year') {
                // 显示年度报表，隐藏月度报表
                document.getElementById('monthlyReport').style.display = 'none';
                document.getElementById('yearlyReport').style.display = 'block';
                document.getElementById('reportYearTitle').textContent = `${selectedYear}年年度报告`;
                loadYearlyReport(selectedYear);
            } else {
                // 显示月度报表，隐藏年度报表
                document.getElementById('monthlyReport').style.display = 'block';
                document.getElementById('yearlyReport').style.display = 'none';
                document.getElementById('reportMonthTitle').textContent = `${selectedYear}年${selectedMonth}月月度报告`;
                loadMonthlyReport(selectedYear, parseInt(selectedMonth));
            }
        }
        
        // 加载月度报表数据
        function loadMonthlyReport(year, month) {
            const monthKey = `${year}-${String(month).padStart(2, '0')}`;
            const statsKey = STORAGE.MONTHLY_STATS + monthKey;
            const budgetUsedKey = STORAGE.MONTHLY_BUDGET_USED + monthKey;
            
            // 获取月度统计数据
            const monthlyStats = JSON.parse(localStorage.getItem(statsKey) || '{"income":0,"expense":0,"balance":0}');
            
            // 更新月度统计显示
            document.getElementById('reportMonthIncome').textContent = monthlyStats.income.toFixed(2);
            document.getElementById('reportMonthExpense').textContent = monthlyStats.expense.toFixed(2);
            document.getElementById('reportMonthBalance').textContent = monthlyStats.balance.toFixed(2);
            document.getElementById('reportMonthBalance').className = `value ${monthlyStats.balance >= 0 ? 'positive' : 'negative'}`;
            
            // 获取当月账单数据用于分类统计
            const bills = getBills();
            const categories = getCategories();
            const categoryList = document.getElementById('reportCategoryList');
            
            // 筛选当月账单
            const monthlyBills = bills.filter(bill => {
                const billDate = new Date(bill.date);
                return billDate.getFullYear() === year && 
                       billDate.getMonth() + 1 === month &&
                       bill.type === 'expense'; // 只统计支出
            });
            
            // 计算分类支出
            const categoryExpenses = {};
            monthlyBills.forEach(bill => {
                const categoryId = bill.categoryId;
                if (!categoryExpenses[categoryId]) {
                    categoryExpenses[categoryId] = 0;
                }
                categoryExpenses[categoryId] += parseFloat(bill.amount);
            });
            
            // 渲染分类支出列表
            if (Object.keys(categoryExpenses).length === 0) {
                categoryList.innerHTML = '<div class="empty">暂无分类支出数据</div>';
            } else {
                categoryList.innerHTML = '';
                
                // 按金额排序
                const sortedCategories = Object.entries(categoryExpenses)
                    .sort((a, b) => b[1] - a[1]);
                
                sortedCategories.forEach(([categoryId, amount]) => {
                    const category = categories.find(c => c.id === categoryId) || { name: '未知类别' };
                    
                    const item = document.createElement('div');
                    item.className = 'report-category-item';
                    item.innerHTML = `
                        <div class="report-category-name">${category.name}</div>
                        <div class="report-category-amount">¥${amount.toFixed(2)}</div>
                    `;
                    categoryList.appendChild(item);
                });
            }
            
            // 加载预算执行情况
            const monthlyBudgetUsed = JSON.parse(localStorage.getItem(budgetUsedKey) || '{}');
            const budgets = getCategoryBudgets();
            const budgetList = document.getElementById('reportBudgetList');
            
            const budgetItems = Object.keys(monthlyBudgetUsed).filter(categoryId => {
                const budget = monthlyBudgetUsed[categoryId];
                return budget && budget.amount > 0;
            });
            
            if (budgetItems.length === 0) {
                budgetList.innerHTML = '<div class="empty">暂无预算数据</div>';
            } else {
                budgetList.innerHTML = '';
                
                budgetItems.forEach(categoryId => {
                    const category = categories.find(c => c.id === categoryId) || { name: '未知类别' };
                    const budget = monthlyBudgetUsed[categoryId];
                    const used = parseFloat(budget.used || 0);
                    const amount = parseFloat(budget.amount);
                    const progress = Math.min(100, Math.round((used / amount) * 100));
                    
                    const item = document.createElement('div');
                    item.className = 'report-category-item';
                    item.innerHTML = `
                        <div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                <div class="report-category-name">${category.name}</div>
                                <div style="font-weight: 600; ${used > amount ? 'color: #FF3B30' : 'color: #34C759'}">
                                    ${used > amount ? '超支' : '剩余'}: ¥${Math.abs(amount - used).toFixed(2)}
                                </div>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">
                                <span>已用: ¥${used.toFixed(2)}</span>
                                <span>预算: ¥${amount.toFixed(2)}</span>
                            </div>
                            <div class="report-budget-progress">
                                <div class="report-budget-progress-bar ${used > amount ? 'overbudget' : ''}" style="width: ${Math.min(progress, 100)}%"></div>
                            </div>
                        </div>
                    `;
                    budgetList.appendChild(item);
                });
            }
        }
        
        // 加载年度报表数据
        function loadYearlyReport(year) {
            const categories = getCategories();
            const bills = getBills();
            
            // 筛选年度账单
            const yearlyBills = bills.filter(bill => {
                const billDate = new Date(bill.date);
                return billDate.getFullYear() === year;
            });
            
            // 计算年度统计
            let yearIncome = 0;
            let yearExpense = 0;
            
            yearlyBills.forEach(bill => {
                const amount = parseFloat(bill.amount);
                if (bill.type === 'income') {
                    yearIncome += amount;
                } else {
                    yearExpense += amount;
                }
            });
            
            const yearBalance = yearIncome - yearExpense;
            
            // 更新年度统计显示
            document.getElementById('reportYearIncome').textContent = yearIncome.toFixed(2);
            document.getElementById('reportYearExpense').textContent = yearExpense.toFixed(2);
            document.getElementById('reportYearBalance').textContent = yearBalance.toFixed(2);
            document.getElementById('reportYearBalance').className = `value ${yearBalance >= 0 ? 'positive' : 'negative'}`;
            
            // 生成月度趋势图
            const monthlyTrend = document.getElementById('monthlyTrendChart');
            monthlyTrend.innerHTML = '';
            
            const monthlyIncome = new Array(12).fill(0);
            const monthlyExpense = new Array(12).fill(0);
            
            yearlyBills.forEach(bill => {
                const billDate = new Date(bill.date);
                const month = billDate.getMonth(); // 0-11
                const amount = parseFloat(bill.amount);
                
                if (bill.type === 'income') {
                    monthlyIncome[month] += amount;
                } else {
                    monthlyExpense[month] += amount;
                }
            });
            
            // 计算最大值用于比例缩放
            const maxValue = Math.max(...monthlyIncome, ...monthlyExpense);
            
            // 生成趋势图
            for (let month = 0; month < 12; month++) {
                const monthName = `${month + 1}月`;
                const incomeHeight = maxValue > 0 ? (monthlyIncome[month] / maxValue * 80) : 0;
                const expenseHeight = maxValue > 0 ? (monthlyExpense[month] / maxValue * 80) : 0;
                
                const monthContainer = document.createElement('div');
                monthContainer.style.display = 'flex';
                monthContainer.style.flexDirection = 'column';
                monthContainer.style.alignItems = 'center';
                monthContainer.style.flex = 1;
                monthContainer.style.height = '100%';
                
                // 收入柱
                if (monthlyIncome[month] > 0) {
                    const incomeBar = document.createElement('div');
                    incomeBar.className = 'report-trend-bar report-trend-bar-income';
                    incomeBar.style.height = `${incomeHeight}px`;
                    incomeBar.style.marginBottom = '2px';
                    incomeBar.title = `收入: ¥${monthlyIncome[month].toFixed(2)}`;
                    monthContainer.appendChild(incomeBar);
                }
                
                // 支出柱
                if (monthlyExpense[month] > 0) {
                    const expenseBar = document.createElement('div');
                    expenseBar.className = 'report-trend-bar report-trend-bar-expense';
                    expenseBar.style.height = `${expenseHeight}px`;
                    expenseBar.title = `支出: ¥${monthlyExpense[month].toFixed(2)}`;
                    monthContainer.appendChild(expenseBar);
                }
                
                // 月份标签
                const monthLabel = document.createElement('div');
                monthLabel.className = 'report-trend-label';
                monthLabel.textContent = monthName;
                monthContainer.appendChild(monthLabel);
                
                monthlyTrend.appendChild(monthContainer);
            }
            
            // 计算年度分类统计
            const categoryList = document.getElementById('reportYearCategoryList');
            const categoryExpenses = {};
            
            yearlyBills.forEach(bill => {
                if (bill.type === 'expense') {
                    const categoryId = bill.categoryId;
                    if (!categoryExpenses[categoryId]) {
                        categoryExpenses[categoryId] = 0;
                    }
                    categoryExpenses[categoryId] += parseFloat(bill.amount);
                }
            });
            
            // 渲染年度分类统计
            if (Object.keys(categoryExpenses).length === 0) {
                categoryList.innerHTML = '<div class="empty">暂无分类支出数据</div>';
            } else {
                categoryList.innerHTML = '';
                
                // 按金额排序
                const sortedCategories = Object.entries(categoryExpenses)
                    .sort((a, b) => b[1] - a[1]);
                
                sortedCategories.forEach(([categoryId, amount]) => {
                    const category = categories.find(c => c.id === categoryId) || { name: '未知类别' };
                    
                    const item = document.createElement('div');
                    item.className = 'report-category-item';
                    item.innerHTML = `
                        <div class="report-category-name">${category.name}</div>
                        <div class="report-category-amount">¥${amount.toFixed(2)}</div>
                    `;
                    categoryList.appendChild(item);
                });
            }
        }
    </script>
</body>
