<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口袋账单 · 质感重构 + 右滑小胶囊操作</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ---------- 设计令牌 ---------- */
        :root {
            --color-primary: #0066CC;
            --color-success: #34C759;
            --color-danger: #FF3B30;
            --color-warning: #FF9500;
            --bg-page: #F2F2F7;
            --bg-card: #FFFFFF;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-divider: rgba(60, 60, 67, 0.18);
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-xxl: 24px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
        }
        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.4;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
            padding-left: 16px;
            padding-right: 16px;
            padding-bottom: 100px;
            position: relative;
        }
        .amount { font-variant-numeric: tabular-nums; font-family: 'SF Mono', monospace; }
        /* 顶部导航栏 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-lg) var(--spacing-xl);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid var(--bg-divider);
            padding-top: calc(var(--spacing-lg) + env(safe-area-inset-top));
        }
        .navbar h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .navbar-actions { display: flex; gap: var(--spacing-md); }
        .navbar-actions button {
            padding: 8px 16px;
            background: rgba(0, 102, 204, 0.1);
            color: var(--color-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .navbar-actions button:active { transform: scale(0.96); opacity: 0.8; }
        #reportBtn { background: #8E8E93 !important; color: white !important; }
        .main-content { margin-top: calc(70px + env(safe-area-inset-top)); }
        /* 统计卡片 */
        .stats-container {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin: var(--spacing-lg) 0;
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-soft);
        }
        .stats-scroll { display: flex; justify-content: space-around; text-align: center; }
        .stat-card {
            flex: 1;
            padding: 0 var(--spacing-md);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .stat-card:active { transform: scale(0.96); opacity: 0.8; }
        .stat-card:not(:last-child) { border-right: 1px solid var(--bg-divider); }
        .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: var(--spacing-xs); }
        .stat-card .value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .value.positive { color: var(--color-success); }
        .value.negative { color: var(--color-danger); }
        /* 卡片通用 */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin: var(--spacing-lg) 0;
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-soft);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-lg);
        }
        .card-header span { font-size: 18px; font-weight: 600; }
        .card-header button, .modal-actions button, #addCategoryBtn, #editBudgetBtn, #toggleBillListBtn {
            padding: 8px 16px;
            background: rgba(0, 102, 204, 0.1);
            color: var(--color-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card-header button:active, .modal-actions button:active { transform: scale(0.96); opacity: 0.8; }
        #toggleBillListBtn { background: transparent; }
        /* 预算进度条 */
        .budget-progress-container { display: flex; flex-direction: column; gap: var(--spacing-md); }
        .budget-item { margin-bottom: var(--spacing-sm); }
        .budget-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: var(--spacing-xs); }
        .budget-bar { height: 6px; background: #E5E5EA; border-radius: var(--radius-full); overflow: hidden; width: 100%; }
        .budget-fill { height: 100%; border-radius: var(--radius-full); transition: width 0.3s ease; }
        .budget-fill.normal { background: var(--color-primary); }
        .budget-fill.warning { background: var(--color-warning); }
        .budget-fill.over { background: var(--color-danger); }
        
        /* ========= 右滑账单操作样式（统一小胶囊风格） ========= */
        .list-item-wrapper {
            position: relative;
            overflow: hidden;
            border-bottom: 0.5px solid var(--bg-divider);
        }
        .list-item-wrapper:last-child {
            border-bottom: none;
        }
        /* 滑动内容容器 */
        .swipe-content {
            display: flex;
            width: 100%;
            transition: transform 0.2s ease;
            background: var(--bg-card);
            position: relative;
            z-index: 2;
            cursor: pointer;
        }
        /* 右滑操作按钮容器（垂直居中，和分类管理按钮对齐） */
        .swipe-actions {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding-right: var(--spacing-md);
            z-index: 1;
        }
        /* 操作按钮通用样式（和分类管理按钮完全统一） */
        .swipe-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--bg-divider);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 编辑按钮样式（主色风格） */
        .swipe-btn.edit {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        /* 删除按钮样式（危险色风格） */
        .swipe-btn.delete {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }
        /* 按钮点击反馈 */
        .swipe-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* 原有账单列表内部样式 */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md) 0;
            width: 100%;
            background: transparent;
        }
        .item-info { display: flex; align-items: center; gap: var(--spacing-md); flex: 1; }
        .category-icon {
            width: 36px; height: 36px;
            border-radius: var(--radius-full);
            background: rgba(0, 102, 204, 0.1);
            color: var(--color-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600;
        }
        .item-name { font-weight: 600; font-size: 16px; }
        .item-desc { font-size: 13px; color: var(--text-secondary); }
        .item-amount { font-weight: 700; font-size: 17px; font-variant-numeric: tabular-nums; }
        .income-amount { color: var(--color-success); }
        .expense-amount { color: var(--color-danger); }
        /* 分类列表 操作按钮 */
        .category-actions { display: flex; gap: var(--spacing-sm); }
        .category-actions button {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--bg-divider);
            border-radius: var(--radius-md);
            font-size: 12px;
            cursor: pointer;
        }
        .empty-state { text-align: center; padding: var(--spacing-xxl) 0; color: var(--text-tertiary); }
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.2s, z-index 0.2s;
        }
        .modal.show { z-index: 1000; opacity: 1; }
        .modal-content {
            background: #FFFFFF;
            border-radius: 28px 28px 0 0;
            padding: var(--spacing-xxl) var(--spacing-xl);
            width: 100%;
            max-width: 500px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.1, 1);
            border-top: 0.5px solid var(--bg-divider);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal.show .modal-content { transform: translateY(0); }
        .modal-content h3 { margin-bottom: var(--spacing-xl); font-size: 20px; font-weight: 700; text-align: center; }
        .form-group { margin-bottom: var(--spacing-lg); }
        .form-group label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 0.5px solid var(--bg-divider);
            border-radius: 14px;
            font-size: 16px;
        }
        .modal-actions { display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl); }
        .filter-section { display: flex; gap: var(--spacing-sm); align-items: center; }
        .filter-section input[type="date"] {
            padding: 8px 12px;
            border-radius: 20px;
            border: 0.5px solid var(--bg-divider);
            font-size: 14px;
            min-width: 120px;
            background-color: white;
            transition: all 0.2s;
        }
        .filter-section input[type="date"].has-bill {
            background-color: rgba(255, 59, 48, 0.1);
            border-color: var(--color-danger);
            color: var(--color-danger);
            font-weight: 600;
        }
        .add-btn {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            right: 20px;
            width: 56px; height: 56px;
            border-radius: var(--radius-full);
            background: var(--color-primary);
            color: white;
            border: none;
            font-size: 28px;
            box-shadow: var(--shadow-hover);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 99;
        }
        .add-btn:active { transform: scale(0.92); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 14px 24px;
            border-radius: 18px;
            transition: transform 0.3s ease;
            display: none;
            z-index: 1001;
        }
        .hidden { display: none; }
        .hidden-file-input { display: none; }
        /* 报表模块 */
        .report-content { max-height: 80vh; overflow-y: auto; padding: var(--spacing-xl); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); }
        .report-header h2 { font-size: 20px; font-weight: 600; }
        .close-btn { font-size: 28px; background: transparent; border: none; cursor: pointer; padding: 0 10px; }
        .report-filter { display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-lg); }
        .report-filter select { padding: 8px 12px; border-radius: var(--radius-md); border: 1px solid var(--bg-divider); background: white; }
        .report-summary { display: flex; justify-content: space-around; background: var(--bg-page); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-lg); }
        .summary-item { text-align: center; }
        .summary-item .label { font-size: 13px; color: var(--text-secondary); }
        .summary-item .value { font-size: 18px; font-weight: 700; }
        .value.income { color: var(--color-success); }
        .value.expense { color: var(--color-danger); }
        .chart-wrapper { height: 220px; margin: 10px auto; display: flex; justify-content: center; align-items: center; }
        #categoryPieChart { max-width: 280px; max-height: 220px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>口袋账单</h1>
        <div class="navbar-actions">
            <button id="importBtn">导入</button>
            <button id="exportBtn">导出</button>
            <button id="categoryBtn">分类</button>
            <button id="reportBtn">报表</button>
        </div>
    </div>
    <div class="main-content">
        <input type="file" id="importFileInput" class="hidden-file-input" accept=".json">
        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stats-scroll">
                <div class="stat-card"><div class="label">总收入</div><div class="value positive" id="totalIncome">0.00</div></div>
                <div class="stat-card"><div class="label">总支出</div><div class="value negative" id="totalExpense">0.00</div></div>
                <div class="stat-card"><div class="label">结余</div><div class="value" id="totalBalance">0.00</div></div>
            </div>
        </div>
        <!-- 预算卡片 -->
        <div class="card">
            <div class="card-header"><span>预算管理</span><button id="editBudgetBtn">设置预算</button></div>
            <div id="budgetList" class="budget-progress-container"><div class="empty-state">暂无分类预算数据</div></div>
        </div>
        <!-- 账单卡片 -->
        <div class="card">
            <div class="card-header">
                <div class="date-indicator"><span>账单</span></div>
                <div class="filter-section">
                    <input type="date" id="dateFilter">
                    <button id="toggleBillListBtn">折叠</button>
                </div>
            </div>
            <div id="billList" class="list"><div class="empty-state">📋 暂无账单</div></div>
        </div>
        <!-- 分类卡片（初始隐藏）-->
        <div class="card" id="categoryCard" style="display: none;">
            <div class="card-header"><span>分类管理</span><button id="addCategoryBtn">新增分类</button></div>
            <div id="categoryList" class="list"><div class="empty-state">暂无分类数据</div></div>
        </div>
        <!-- 模态框集合 -->
        <div class="modal" id="addBillModal"><div class="modal-content"><h3>添加账单</h3>
            <div class="form-group"><label>类型</label><select id="billType"><option value="expense">支出</option><option value="income">收入</option></select></div>
            <div class="form-group"><label>分类</label><select id="billCategory"></select></div>
            <div class="form-group"><label>金额（元）</label><input type="number" id="billAmount" step="0.01" min="0.01" placeholder="输入金额"></div>
            <div class="form-group"><label>日期</label><input type="date" id="billDate" max=""></div>
            <div class="form-group"><label>备注</label><input type="text" id="billNote" maxlength="50" placeholder="最多50字"></div>
            <div class="modal-actions"><button id="cancelAddBill">取消</button><button id="saveBillBtn">保存</button></div>
        </div></div>
        <div class="modal" id="editBillModal"><div class="modal-content"><h3>编辑账单</h3><input type="hidden" id="editBillId">
            <div class="form-group"><label>类型</label><select id="editBillType"><option value="expense">支出</option><option value="income">收入</option></select></div>
            <div class="form-group"><label>分类</label><select id="editBillCategory"></select></div>
            <div class="form-group"><label>金额</label><input type="number" id="editBillAmount" step="0.01" min="0.01"></div>
            <div class="form-group"><label>日期</label><input type="date" id="editBillDate" max=""></div>
            <div class="form-group"><label>备注</label><input type="text" id="editBillNote" maxlength="50"></div>
            <div class="modal-actions"><button id="deleteBillBtn" style="background:#FF3B30;color:white;">删除</button><button id="cancelEditBill">取消</button><button id="updateBillBtn">保存</button></div>
        </div></div>
        <div class="modal" id="addCategoryModal"><div class="modal-content"><h3>新增分类</h3><div class="form-group"><label>分类名称</label><input type="text" id="newCategoryName" maxlength="10"></div><div class="modal-actions"><button id="cancelAddCategory">取消</button><button id="saveCategoryBtn">保存</button></div></div></div>
        <div class="modal" id="setBudgetModal"><div class="modal-content"><h3>设置分类预算</h3><div class="form-group"><label>选择分类</label><select id="budgetCategorySelect"></select></div><div class="form-group"><label>预算金额（元）</label><input type="number" id="budgetAmountInput" step="0.01" min="0.01"></div><div class="modal-actions"><button id="cancelSetBudget">取消</button><button id="saveBudgetBtn">保存</button></div></div></div>
        <div class="modal" id="reportModal"><div class="modal-content report-content"><div class="report-header"><h2>财务报表</h2><button id="closeReportBtn" class="close-btn">×</button></div>
            <div class="report-filter"><select id="reportYear"></select><select id="reportMonth"><option value="all">全年</option><option value="01">01月</option><option value="02">02月</option><option value="03">03月</option><option value="04">04月</option><option value="05">05月</option><option value="06">06月</option><option value="07">07月</option><option value="08">08月</option><option value="09">09月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select></div>
            <div class="report-summary"><div class="summary-item"><p class="label">总收入</p><p class="value income" id="reportIncome">0.00</p></div><div class="summary-item"><p class="label">总支出</p><p class="value expense" id="reportExpense">0.00</p></div><div class="summary-item"><p class="label">结余</p><p class="value balance" id="reportBalance">0.00</p></div></div>
            <div class="report-category"><h3>支出分类占比</h3><div class="chart-wrapper"><canvas id="categoryPieChart"></canvas></div></div>
        </div></div>
        <button class="add-btn" id="addBillBtn">+</button>
        <div class="toast" id="toast"></div>
    </div>
    <script>
        (function(){
            // ---------- 存储键 ----------
            const STORAGE = {
                BILLS: 'bills',
                CATEGORIES: 'categories',
                CATEGORY_BUDGETS: 'categoryBudgets',
                MONTHLY_STATS: 'monthly_stats_',
                MONTHLY_BUDGET_USED: 'monthly_budget_used_'
            };
            let currentSelectedDate = null;
            let isBillListCollapsed = false;
            let categoryChart = null;
            
            // ========== 右滑相关全局变量 (阈值已适配小胶囊按钮) ==========
            let startX = 0;
            let currentX = 0;
            let isSwiping = false;
            let activeSwipeElement = null;
            const SWIPE_THRESHOLD = 110; // 适配小胶囊按钮的总宽度 (原140改为110)

            // 工具函数
            const getTodayDate = () => { let d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
            const getCurrentMonthKey = () => { let d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
            const showToast = (msg) => { let t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; t.style.transform='translateX(-50%) translateY(0)'; setTimeout(()=>{ t.style.transform='translateX(-50%) translateY(100%)'; setTimeout(()=>t.style.display='none',300); },2000); };
            
            // 数据读取
            function getBills(){ return JSON.parse(localStorage.getItem(STORAGE.BILLS)||'[]'); }
            function getCategories(){ return JSON.parse(localStorage.getItem(STORAGE.CATEGORIES)||'[]'); }
            function getCategoryBudgets(){ return JSON.parse(localStorage.getItem(STORAGE.CATEGORY_BUDGETS)||'{}'); }
            function saveCategories(cats){ localStorage.setItem(STORAGE.CATEGORIES, JSON.stringify(cats)); }
            function saveBills(bills){ localStorage.setItem(STORAGE.BILLS, JSON.stringify(bills)); }
            function saveBudgets(budgets){ localStorage.setItem(STORAGE.CATEGORY_BUDGETS, JSON.stringify(budgets)); }

            // 数据迁移 (保持原逻辑)
            function migrateOldData() {
                let needSave = false;
                let categories = getCategories();
                let idMap = new Map();
                let migratedCats = categories.map(cat => {
                    let oldId = cat.id;
                    if (typeof oldId !== 'string') {
                        needSave = true;
                        let newId = oldId.toString();
                        idMap.set(oldId, newId);
                        return { ...cat, id: newId };
                    }
                    return cat;
                });
                if (needSave) saveCategories(migratedCats);
                let bills = getBills();
                let billsChanged = false;
                let migratedBills = bills.map(bill => {
                    let oldCatId = bill.categoryId;
                    if (oldCatId !== undefined && typeof oldCatId !== 'string' && idMap.has(oldCatId)) {
                        billsChanged = true;
                        return { ...bill, categoryId: idMap.get(oldCatId) };
                    }
                    return bill;
                });
                if (billsChanged) saveBills(migratedBills);
                let budgets = getCategoryBudgets();
                let budgetsChanged = false;
                let newBudgets = {};
                for (let [key, value] of Object.entries(budgets)) {
                    let newKey = typeof key === 'string' ? key : (idMap.has(key) ? idMap.get(key) : key.toString());
                    if (newKey !== key) budgetsChanged = true;
                    newBudgets[newKey] = value;
                }
                if (budgetsChanged) saveBudgets(newBudgets);
            }

            // 月度统计 & 预算更新函数
            function updateMonthlyStats(){
                const bills = getBills();
                const currentMonthKey = getCurrentMonthKey();
                const [targetYear, targetMonth] = currentMonthKey.split('-');
                let totalIncome=0, totalExpense=0;
                bills.forEach(bill => {
                    const billDate = new Date(bill.date);
                    const billYear = String(billDate.getFullYear());
                    const billMonth = String(billDate.getMonth()+1).padStart(2,'0');
                    if(billYear === targetYear && billMonth === targetMonth){
                        bill.type === 'income' ? totalIncome += bill.amount : totalExpense += bill.amount;
                    }
                });
                const monthlyStats = { income: totalIncome, expense: totalExpense, balance: totalIncome - totalExpense };
                localStorage.setItem(STORAGE.MONTHLY_STATS+currentMonthKey, JSON.stringify(monthlyStats));
                return monthlyStats;
            }
            function renderStats(){
                const stats = updateMonthlyStats();
                document.getElementById('totalIncome').textContent = stats.income.toFixed(2);
                document.getElementById('totalExpense').textContent = stats.expense.toFixed(2);
                const balEl = document.getElementById('totalBalance');
                balEl.textContent = stats.balance.toFixed(2);
                balEl.className = `value ${stats.balance >=0 ? 'positive' : 'negative'}`;
            }
            function updateMonthlyBudgetUsed(){
                const bills = getBills();
                const currentMonthKey = getCurrentMonthKey();
                const [targetYear, targetMonth] = currentMonthKey.split('-');
                const categoryUsed = {};
                bills.filter(bill => {
                    const d = new Date(bill.date);
                    return bill.type === 'expense' && String(d.getFullYear())===targetYear && String(d.getMonth()+1).padStart(2,'0')===targetMonth;
                }).forEach(bill => { categoryUsed[bill.categoryId] = (categoryUsed[bill.categoryId]||0) + bill.amount; });
                const formattedUsed = {};
                Object.entries(categoryUsed).forEach(([cid, used])=> { formattedUsed[cid] = { used }; });
                localStorage.setItem(STORAGE.MONTHLY_BUDGET_USED+currentMonthKey, JSON.stringify(formattedUsed));
                return formattedUsed;
            }
            function renderCategoryBudgets(){
                const allBudgets = getCategoryBudgets();
                const monthlyUsed = updateMonthlyBudgetUsed();
                const allCategories = getCategories();
                const container = document.getElementById('budgetList');
                const validItems = allCategories.filter(cat => allBudgets[cat.id] && parseFloat(allBudgets[cat.id].amount) > 0);
                if(validItems.length === 0){ container.innerHTML = '<div class="empty-state">暂无分类预算数据</div>'; return; }
                container.innerHTML = '';
                validItems.forEach(cat => {
                    const budget = allBudgets[cat.id].amount;
                    const used = monthlyUsed[cat.id]?.used || 0;
                    const percent = Math.min(100, (used/budget)*100);
                    let progressClass = 'normal';
                    if(used/budget > 0.9) progressClass = 'warning';
                    if(used > budget) progressClass = 'over';
                    const remain = budget - used;
                    const div = document.createElement('div');
                    div.className='budget-item';
                    div.innerHTML = `<div class="budget-header"><span>${cat.name}</span><span>${used.toFixed(2)} / ${budget.toFixed(2)}</span></div>
                                    <div class="budget-bar"><div class="budget-fill ${progressClass}" style="width:${percent}%;"></div></div>
                                    <div style="font-size:13px; color:${remain<0?'var(--color-danger)':'var(--text-secondary)'}">${remain<0 ? '超支 '+Math.abs(remain).toFixed(2) : '剩余 '+remain.toFixed(2)}</div>`;
                    container.appendChild(div);
                });
            }

            // 右滑核心函数
            function closeAllSwipe(){
                document.querySelectorAll('.swipe-content').forEach(el => {
                    el.style.transform = 'translateX(0px)';
                });
                activeSwipeElement = null;
            }
            function handleSwipeStart(e){
                if(activeSwipeElement && activeSwipeElement !== e.currentTarget){
                    closeAllSwipe();
                }
                startX = e.touches[0].clientX;
                currentX = 0;
                isSwiping = false;
                e.currentTarget.style.transition = 'none';
            }
            function handleSwipeMove(e){
                const moveX = e.touches[0].clientX;
                const diffX = moveX - startX;
                if(diffX > 0) return;
                const limitX = Math.max(diffX, -SWIPE_THRESHOLD);
                currentX = limitX;
                e.currentTarget.style.transform = `translateX(${currentX}px)`;
                if(Math.abs(diffX) > 10){
                    isSwiping = true;
                    e.preventDefault();
                }
            }
            function handleSwipeEnd(e){
                e.currentTarget.style.transition = 'transform 0.2s ease';
                if(currentX <= -SWIPE_THRESHOLD/2){
                    e.currentTarget.style.transform = `translateX(-${SWIPE_THRESHOLD}px)`;
                    activeSwipeElement = e.currentTarget;
                } else {
                    e.currentTarget.style.transform = 'translateX(0px)';
                    activeSwipeElement = null;
                }
                isSwiping = false;
            }
            function bindSwipeEvents(){
                document.querySelectorAll('.swipe-content').forEach(el => {
                    el.removeEventListener('touchstart', handleSwipeStart);
                    el.removeEventListener('touchmove', handleSwipeMove);
                    el.removeEventListener('touchend', handleSwipeEnd);
                    el.addEventListener('touchstart', handleSwipeStart);
                    el.addEventListener('touchmove', handleSwipeMove);
                    el.addEventListener('touchend', handleSwipeEnd);
                });
            }

            // 刷新所有UI
            function refreshAll(){
                renderStats();
                renderCategoryBudgets();
                renderBillsWithDate();
                updateAllCategorySelects();
                markDateHasBill();
                renderCategories();
            }
            function markDateHasBill(){
                const input = document.getElementById('dateFilter');
                const bills = getBills();
                const hasBill = bills.some(b => b.date === input.value);
                if(hasBill) input.classList.add('has-bill');
                else input.classList.remove('has-bill');
            }
            // 账单渲染（带右滑小胶囊结构）
            function renderBillsWithDate(){
                let target = currentSelectedDate || getTodayDate();
                let bills = getBills();
                let cats = getCategories();
                let filtered = bills.filter(b => b.date === target);
                let container = document.getElementById('billList');
                if(filtered.length === 0){
                    container.innerHTML = `<div class="empty-state">📋 ${target===getTodayDate()?'今日暂无账单':'该日期暂无账单'}</div>`;
                    markDateHasBill(); return;
                }
                container.innerHTML = '';
                filtered.forEach(bill => {
                    let cat = cats.find(c=>c.id===bill.categoryId) || {name:'未知', id:'unknown'};
                    let wrapper = document.createElement('div');
                    wrapper.className = 'list-item-wrapper';
                    let amountClass = bill.type==='income' ? 'income-amount' : 'expense-amount';
                    wrapper.innerHTML = `
                        <div class="swipe-content" data-id="${bill.id}">
                            <div class="list-item">
                                <div class="item-info">
                                    <span class="category-icon">${cat.name.charAt(0)}</span>
                                    <div>
                                        <div class="item-name">${cat.name}</div>
                                        <div class="item-desc">${bill.note||'无备注'}</div>
                                    </div>
                                </div>
                                <div class="item-amount ${amountClass}">${bill.type==='income'?'+':'-'}${bill.amount.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="swipe-actions">
                            <button class="swipe-btn edit" data-id="${bill.id}">编辑</button>
                            <button class="swipe-btn delete" data-id="${bill.id}">删除</button>
                        </div>
                    `;
                    const swipeContent = wrapper.querySelector('.swipe-content');
                    swipeContent.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if(swipeContent.style.transform !== 'translateX(0px)' && swipeContent.style.transform !== ''){
                            closeAllSwipe();
                            return;
                        }
                        openEditBillModal(bill.id);
                    });
                    container.appendChild(wrapper);
                });
                bindSwipeEvents();
                markDateHasBill();
            }
            function openEditBillModal(billId){
                const bill = getBills().find(b=>b.id===billId);
                if(!bill) return;
                document.getElementById('editBillId').value = bill.id;
                document.getElementById('editBillType').value = bill.type;
                document.getElementById('editBillAmount').value = bill.amount;
                document.getElementById('editBillDate').value = bill.date;
                document.getElementById('editBillNote').value = bill.note||'';
                updateCategorySelect('editBillCategory', bill.categoryId);
                document.getElementById('editBillModal').classList.add('show');
            }
            function updateAllCategorySelects(){
                const cats = getCategories();
                const selects = ['billCategory', 'editBillCategory', 'budgetCategorySelect'];
                selects.forEach(id => {
                    const sel = document.getElementById(id);
                    if(sel){
                        const oldVal = sel.value;
                        sel.innerHTML = '';
                        cats.forEach(c => { let opt = document.createElement('option'); opt.value=c.id; opt.textContent=c.name; sel.appendChild(opt); });
                        if(oldVal && cats.some(c=>c.id===oldVal)) sel.value = oldVal;
                        else if(cats.length) sel.selectedIndex = 0;
                    }
                });
            }
            function updateCategorySelect(selectId, selectedId){
                const cats = getCategories();
                const sel = document.getElementById(selectId);
                sel.innerHTML = '';
                cats.forEach(c=>{ let opt=document.createElement('option'); opt.value=c.id; opt.textContent=c.name; sel.appendChild(opt); });
                if(selectedId && cats.some(c=>c.id===selectedId)) sel.value = selectedId;
                else if(cats.length) sel.selectedIndex=0;
            }
            function generateId(){ return Date.now().toString() + Math.random().toString(36).slice(2, 8); }
            function addCategoryLogic(){
                let name = document.getElementById('newCategoryName').value.trim();
                if(!name || name.length>10) return showToast('名称需1-10个字');
                const cats = getCategories();
                if(cats.some(c=>c.name===name)) return showToast('分类名称已存在');
                const newCat = { id: generateId(), name };
                cats.push(newCat);
                saveCategories(cats);
                refreshAll();
                closeModal('addCategoryModal');
                showToast('分类添加成功');
            }
            function renderCategories(){
                const cats = getCategories();
                const container = document.getElementById('categoryList');
                if(cats.length===0){ container.innerHTML='<div class="empty-state">暂无分类数据</div>'; return; }
                container.innerHTML='';
                cats.forEach(cat=>{
                    const div = document.createElement('div');
                    div.className='list-item-wrapper';
                    div.innerHTML = `<div class="list-item"><div class="item-info"><span class="category-icon">${cat.name.charAt(0)}</span><span class="item-name">${cat.name}</span></div>
                    <div class="category-actions"><button class="edit-cat" data-id="${cat.id}">编辑</button><button class="del-cat" data-id="${cat.id}">删除</button></div></div>`;
                    container.appendChild(div);
                });
            }
            function editCategoryById(catId){ 
                const cats = getCategories();
                const cat = cats.find(c=>c.id===catId);
                if(!cat){ showToast('分类不存在'); return; }
                let newName = prompt('输入新分类名称', cat.name)?.trim();
                if(newName === undefined) return;
                if(!newName || newName.length>10) return showToast('名称需1-10个字');
                if(cats.some(c=>c.name===newName && c.id!==catId)) return showToast('分类名称已存在');
                cat.name = newName;
                saveCategories(cats);
                refreshAll();
                showToast('修改成功');
            }
            function deleteCategoryById(catId){
                const bills = getBills();
                if(bills.some(b=>b.categoryId===catId)) return showToast('该分类下存在账单，无法删除');
                let cats = getCategories().filter(c=>c.id!==catId);
                saveCategories(cats);
                const budgets = getCategoryBudgets();
                delete budgets[catId];
                saveBudgets(budgets);
                refreshAll();
                showToast('删除成功');
            }
            function saveNewBill(){
                const type = document.getElementById('billType').value;
                const categoryId = document.getElementById('billCategory').value;
                const amount = parseFloat(document.getElementById('billAmount').value);
                const date = document.getElementById('billDate').value;
                const note = document.getElementById('billNote').value;
                if(!categoryId || isNaN(amount)|| amount<=0) return showToast('请填写完整且金额>0');
                if(!date) return showToast('请选择日期');
                const newBill = { id: generateId(), type, categoryId, amount, date, note: note||'' };
                const bills = getBills();
                bills.push(newBill);
                saveBills(bills);
                refreshAll();
                closeModal('addBillModal');
                showToast('添加成功');
            }
            function updateBill(){
                const id = document.getElementById('editBillId').value;
                let bills = getBills();
                const index = bills.findIndex(b=>b.id===id);
                if(index===-1) return showToast('账单不存在');
                const type = document.getElementById('editBillType').value;
                const categoryId = document.getElementById('editBillCategory').value;
                const amount = parseFloat(document.getElementById('editBillAmount').value);
                const date = document.getElementById('editBillDate').value;
                const note = document.getElementById('editBillNote').value;
                if(!categoryId || isNaN(amount)|| amount<=0) return showToast('请填写完整金额>0');
                bills[index] = { ...bills[index], type, categoryId, amount, date, note: note||'' };
                saveBills(bills);
                refreshAll();
                closeModal('editBillModal');
                showToast('修改成功');
            }
            function deleteBillLogic(billId){
                let bills = getBills().filter(b=>b.id!==billId);
                saveBills(bills);
                refreshAll();
                closeAllSwipe();
                showToast('删除成功');
            }
            function saveBudget(){
                const catId = document.getElementById('budgetCategorySelect').value;
                const amount = parseFloat(document.getElementById('budgetAmountInput').value);
                if(!catId || isNaN(amount)|| amount<=0) return showToast('请选择分类且预算>0');
                const budgets = getCategoryBudgets();
                budgets[catId] = { amount };
                saveBudgets(budgets);
                refreshAll();
                closeModal('setBudgetModal');
                showToast('预算保存成功');
            }
            function closeModal(modalId){
                const modal = document.getElementById(modalId);
                modal.classList.remove('show');
            }
            function initReportModal(){
                const yearSelect = document.getElementById('reportYear');
                const curYear = new Date().getFullYear();
                for(let y=curYear-3; y<=curYear+1; y++){ let opt=document.createElement('option'); opt.value=y; opt.textContent=y+'年'; yearSelect.appendChild(opt); }
                yearSelect.value = curYear;
                document.getElementById('reportMonth').value = 'all';
                document.getElementById('reportYear').addEventListener('change',()=>updateReport());
                document.getElementById('reportMonth').addEventListener('change',()=>updateReport());
                updateReport();
            }
            function updateReport(){
                const year = parseInt(document.getElementById('reportYear').value);
                const month = document.getElementById('reportMonth').value;
                const bills = getBills();
                const filtered = bills.filter(b=>{
                    const d = new Date(b.date);
                    if(d.getFullYear() !== year) return false;
                    if(month !== 'all' && String(d.getMonth()+1).padStart(2,'0') !== month) return false;
                    return true;
                });
                let totalIncome=0, totalExpense=0;
                const expenseMap = new Map();
                filtered.forEach(b=>{
                    if(b.type==='income') totalIncome+=b.amount;
                    else { totalExpense+=b.amount; expenseMap.set(b.categoryId, (expenseMap.get(b.categoryId)||0)+b.amount); }
                });
                document.getElementById('reportIncome').textContent=totalIncome.toFixed(2);
                document.getElementById('reportExpense').textContent=totalExpense.toFixed(2);
                const balance = totalIncome-totalExpense;
                const balSpan = document.getElementById('reportBalance');
                balSpan.textContent=balance.toFixed(2);
                balSpan.className = `value balance ${balance>=0?'positive':'negative'}`;
                const chartWrapper = document.querySelector('#reportModal .chart-wrapper');
                if(totalExpense===0){
                    if(categoryChart){ categoryChart.destroy(); categoryChart=null; }
                    chartWrapper.innerHTML = '<p style="text-align:center;color:var(--text-secondary)">暂无支出数据</p>';
                    return;
                }
                if(categoryChart){ categoryChart.destroy(); categoryChart=null; }
                chartWrapper.innerHTML = '<canvas id="categoryPieChart"></canvas>';
                const canvas = document.getElementById('categoryPieChart');
                if(!canvas) return;
                const cats = getCategories();
                const labels=[], data=[];
                for(let [cid, amt] of expenseMap.entries()){
                    const cat = cats.find(c=>c.id===cid);
                    labels.push(cat?cat.name:'未知');
                    data.push(amt);
                }
                const ctx = canvas.getContext('2d');
                categoryChart = new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data, backgroundColor: ['#0066CC','#34C759','#FF9500','#FF3B30','#5856D6','#FF2D55'] }] }, options: { responsive: true, maintainAspectRatio: true } });
            }
            function initDefaultData(){
                migrateOldData();
                if(!localStorage.getItem(STORAGE.CATEGORIES)){
                    const defaultCats = [{ id: generateId(), name:'餐饮'},{ id: generateId(), name:'交通'},{ id: generateId(), name:'购物'},{ id: generateId(), name:'娱乐'},{ id: generateId(), name:'工资'}];
                    saveCategories(defaultCats);
                }
                if(!localStorage.getItem(STORAGE.BILLS)) saveBills([]);
                refreshAll();
            }
            function bindEvents(){
                document.getElementById('addBillBtn').onclick = ()=>{ updateAllCategorySelects(); document.getElementById('billDate').value=getTodayDate(); document.getElementById('addBillModal').classList.add('show'); };
                document.getElementById('cancelAddBill').onclick = ()=> closeModal('addBillModal');
                document.getElementById('saveBillBtn').onclick = saveNewBill;
                document.getElementById('cancelEditBill').onclick = ()=> closeModal('editBillModal');
                document.getElementById('updateBillBtn').onclick = updateBill;
                document.getElementById('deleteBillBtn').onclick = ()=>{ let id=document.getElementById('editBillId').value; if(id){ deleteBillLogic(id); closeModal('editBillModal'); } };
                document.getElementById('editBudgetBtn').onclick = ()=>{ updateAllCategorySelects(); document.getElementById('setBudgetModal').classList.add('show'); };
                document.getElementById('cancelSetBudget').onclick = ()=> closeModal('setBudgetModal');
                document.getElementById('saveBudgetBtn').onclick = saveBudget;
                document.getElementById('addCategoryBtn').onclick = ()=> document.getElementById('addCategoryModal').classList.add('show');
                document.getElementById('cancelAddCategory').onclick = ()=> closeModal('addCategoryModal');
                document.getElementById('saveCategoryBtn').onclick = addCategoryLogic;
                document.getElementById('categoryBtn').onclick = ()=>{ let card=document.getElementById('categoryCard'); card.style.display = card.style.display==='none'?'block':'none'; renderCategories(); };
                document.getElementById('reportBtn').onclick = ()=>{ initReportModal(); document.getElementById('reportModal').classList.add('show'); };
                document.getElementById('closeReportBtn').onclick = ()=> closeModal('reportModal');
                document.getElementById('importBtn').onclick = ()=> document.getElementById('importFileInput').click();
                document.getElementById('exportBtn').onclick = ()=>{ const data = { bills: getBills(), categories: getCategories(), budgets: getCategoryBudgets() }; const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='pocket_bill.json'; a.click(); URL.revokeObjectURL(a.href); };
                document.getElementById('importFileInput').onchange = (e)=>{ if(e.target.files[0]){ const reader = new FileReader(); reader.onload = ev => { try{ const json = JSON.parse(ev.target.result); if(json.bills) localStorage.setItem(STORAGE.BILLS, JSON.stringify(json.bills)); if(json.categories) localStorage.setItem(STORAGE.CATEGORIES, JSON.stringify(json.categories)); if(json.budgets) localStorage.setItem(STORAGE.CATEGORY_BUDGETS, JSON.stringify(json.budgets)); migrateOldData(); refreshAll(); showToast('导入成功'); }catch(err){ showToast('文件格式错误'); } }; reader.readAsText(e.target.files[0]); } e.target.value=''; };
                document.getElementById('dateFilter').addEventListener('change', (e)=>{ currentSelectedDate = e.target.value; renderBillsWithDate(); markDateHasBill(); });
                let toggleBtn = document.getElementById('toggleBillListBtn');
                toggleBtn.onclick = ()=>{ let billListDiv = document.getElementById('billList'); isBillListCollapsed = !isBillListCollapsed; billListDiv.style.display = isBillListCollapsed ? 'none' : 'block'; toggleBtn.textContent = isBillListCollapsed ? '展开' : '折叠'; };
                document.querySelectorAll('.modal').forEach(modal=>{ modal.addEventListener('click',(e)=>{ if(e.target===modal) closeModal(modal.id); }); });
                const categoryContainer = document.getElementById('categoryList');
                categoryContainer.addEventListener('click', (e) => {
                    const btn = e.target;
                    if(btn.classList.contains('edit-cat')) editCategoryById(btn.dataset.id);
                    else if(btn.classList.contains('del-cat')) deleteCategoryById(btn.dataset.id);
                });
                document.addEventListener('click', (e) => {
                    if(!e.target.closest('.swipe-content') && !e.target.closest('.swipe-actions')){
                        closeAllSwipe();
                    }
                });
                const billListContainer = document.getElementById('billList');
                billListContainer.addEventListener('click', (e) => {
                    const btn = e.target;
                    const billId = btn.dataset.id;
                    if(!billId) return;
                    if(btn.classList.contains('edit')){
                        openEditBillModal(billId);
                        closeAllSwipe();
                    } else if(btn.classList.contains('delete')){
                        if(confirm('确定要删除这条账单吗？')){
                            deleteBillLogic(billId);
                        }
                    }
                });
            }
            initDefaultData();
            bindEvents();
            currentSelectedDate = getTodayDate();
            document.getElementById('dateFilter').value = currentSelectedDate;
            renderBillsWithDate();
            markDateHasBill();
        })();
    </script>
</body>
</html>
